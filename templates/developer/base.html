<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Developer Documentation - Cadence{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Sora:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Sora"', 'sans-serif'],
            title: ['Outfit', 'sans-serif'],
            mono: ['"Fira Code"', 'monospace'],
          },
          colors: {
            primary: {
              DEFAULT: '#FF6B00',
              hover: '#FF8533',
            },
            darkBg: '#070709',
            cardBg: '#0D0E12',
            borderColor: 'rgba(255, 255, 255, 0.06)',
            textMuted: '#90909A',
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbars for the sidebar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #070709;
    }
    ::-webkit-scrollbar-thumb {
      background: #1A1A1E;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #FF6B00;
    }
    
    /* Background Grid overlay */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: -1;
      pointer-events: none;
    }

    /* Dark Mode Overrides for light-theme inline utility classes */
    .text-\[\#0D0D0D\] {
      color: #F7F7F9 !important;
    }
    .text-\[\#6B6B6B\] {
      color: #90909A !important;
    }
    .text-gray-800 {
      color: #F7F7F9 !important;
    }
    .bg-\[\#0D0D0D\]\/40 {
      background-color: rgba(255, 255, 255, 0.03) !important;
    }
    .bg-\[\#1A1A1A\] {
      background-color: #0D0E12 !important;
    }
    .border-\[\#1A1A1A\] {
      border-color: rgba(255, 255, 255, 0.06) !important;
    }
    .border-gray-200 {
      border-color: rgba(255, 255, 255, 0.08) !important;
    }
    .border-gray-200\/60 {
      border-color: rgba(255, 255, 255, 0.08) !important;
    }
    
    /* Info Callouts */
    .bg-amber-50\/50 {
      background-color: rgba(255, 107, 0, 0.06) !important;
    }
    .border-amber-200\/50 {
      border-color: rgba(255, 107, 0, 0.25) !important;
    }
    .text-amber-900 {
      color: #FFB073 !important;
    }
    .text-amber-500 {
      color: #FF6B00 !important;
    }

    /* Badge Method overrides */
    .bg-emerald-100 {
      background-color: rgba(16, 185, 129, 0.1) !important;
    }
    .text-emerald-800 {
      color: #34D399 !important;
    }
    .bg-indigo-100 {
      background-color: rgba(99, 102, 241, 0.1) !important;
    }
    .text-indigo-800 {
      color: #818CF8 !important;
    }
  </style>
</head>
<body class="bg-darkBg text-[#F7F7F9] font-sans antialiased min-h-screen relative">
  <div class="bg-grid"></div>

  <div class="flex min-h-screen">
    <!-- Left sidebar: fixed, scrollable independently -->
    <aside class="w-64 fixed inset-y-0 left-0 bg-[#0A0A0D] border-r border-borderColor z-10 overflow-y-auto">
      {% include "developer/partials/sidebar.html" %}
    </aside>

    <!-- Main Content Area -->
    <div class="ml-64 flex-1 flex flex-col md:flex-row min-h-screen">
      <!-- Main Content -->
      <main class="flex-1 max-w-4xl px-8 lg:px-16 py-12">
        <div class="prose prose-invert max-w-none 
          prose-headings:font-title prose-headings:font-bold prose-headings:tracking-tight
          prose-h1:text-3xl prose-h1:mb-6 prose-h2:text-2xl prose-h2:mt-10 prose-h2:mb-4
          prose-p:text-textMuted prose-p:leading-relaxed prose-p:mb-4
          prose-a:text-primary prose-a:no-underline hover:prose-a:underline
          prose-code:text-primary prose-code:bg-white/5 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:text-xs prose-code:font-mono
          prose-pre:bg-cardBg prose-pre:border prose-pre:border-borderColor prose-pre:rounded-xl prose-pre:p-4 prose-pre:overflow-x-auto">
          {% block content %}{% endblock %}
        </div>
      </main>

      <!-- Right Table of Contents Sidebar -->
      <aside class="w-64 hidden xl:block shrink-0 border-l border-borderColor py-12 px-6">
        <div class="sticky top-12">
          <h5 class="text-xs font-semibold uppercase tracking-wider text-textMuted mb-4">On this page</h5>
          <nav class="space-y-2 text-xs">
            {% block toc %}{% endblock %}
          </nav>
        </div>
      </aside>
    </div>
  </div>
</body>
</html>
