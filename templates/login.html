{% extends "base.html" %}

{% block title %}Login - Cadence Billing{% endblock %}

{% block extra_head %}
<style>
    .auth-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        padding: 2.5rem;
    }

    .auth-title {
        font-family: var(--font-title);
        font-weight: 700;
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
        text-align: center;
        background: linear-gradient(135deg, #fff, var(--text-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .auth-subtitle {
        color: var(--text-secondary);
        font-size: 0.9rem;
        text-align: center;
        margin-bottom: 2rem;
    }

    .form-group {
        margin-bottom: 1.25rem;
    }

    .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
    }

    .form-control {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        color: white;
        font-family: inherit;
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px var(--glow-color);
        background: rgba(255, 255, 255, 0.05);
    }

    .error-msg {
        color: var(--danger);
        font-size: 0.85rem;
        margin-top: 0.5rem;
        display: none;
    }

    .auth-footer {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-secondary);
    }

    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Login to your Cadence merchant portal</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div id="error-box" class="error-msg"></div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Sign In</button>
        </form>
        
        <p class="auth-footer">
            Don't have an account? <a href="/register">Register</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorBox = document.getElementById("error-box");
        
        errorBox.style.display = "none";
        
        try {
            const resp = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            
            const data = await resp.json();
            if (!resp.ok) {
                throw new Error(data.detail || "Authentication failed");
            }
            
            // Store token in cookie
            document.cookie = `access_token=${data.access_token}; path=/; max-age=86400; SameSite=Strict`;
            window.location.href = "/dashboard";
        } catch (err) {
            errorBox.innerText = err.message;
            errorBox.style.display = "block";
        }
    });
</script>
{% endblock %}
